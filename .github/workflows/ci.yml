name: File Confidentiality CI

on:
    pull_request:
        branches:
            - main
        paths:
            - "file-sharing/**"
            - ".github/workflows/ci.yml"
    push:
        branches:
            - main
        paths:
            - "file-sharing/**"
            - ".github/workflows/ci.yml"

permissions:
    contents: read

concurrency:
    group: file-sharing-deploy
    cancel-in-progress: true

jobs:
    test:
        name: Test File Sharing
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: file-sharing
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21
                  cache: maven

            - name: Run file-sharing tests
              run: ./mvnw -q clean test

    deploy-production:
        name: Deploy File Sharing to Render
        needs: test
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        environment: staged
        steps:
            - name: Trigger Render deploy hook
              env:
                  RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL_MAIN }}
              run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
